<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #ffffff; color: #000; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h2 { font-weight: 300; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #eee; border-radius: 8px; outline: none; }
        button { background: #000; color: #fff; border: none; padding: 15px 30px; border-radius: 25px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Оформление заказа</h2>
    <input type="text" id="name" placeholder="Ваше ФИО">
    <input type="tel" id="phone" placeholder="Номер телефона">
    <input type="text" id="address" placeholder="Адрес ПВЗ СДЭК">
    <button id="send">Заказать Le Vase Livre</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        document.getElementById('send').onclick = function() {
            let data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        };
    </script>
</body>
</html>
