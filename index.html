<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --brand-color: #2c2c2c;
            --bg-color: #faf9f6;
            --input-bg: #ffffff;
            --accent-color: #8e7f71;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, serif;
            background-color: var(--bg-color);
            color: var(--brand-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .logo-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        .logo {
            width: 220px; /* Немного увеличил для мобильных */
            height: auto;
            display: block;
        }

        h2 {
            font-weight: 300;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
            text-transform: uppercase;
            font-size: 1.1em;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            flex-grow: 1;
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: 1px solid #e0ddd5;
            border-radius: 10px;
            background: var(--input-bg);
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
            -webkit-appearance: none;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--brand-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:disabled {
            background-color: #777;
            opacity: 0.7;
        }

        .footer {
            margin-top: 40px;
            padding-bottom: 20px;
            text-align: center;
            font-size: 10px;
            color: #a0a0a0;
            line-height: 1.6;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="https://cdn.jsdelivr.net/gh/UpperTrout71529/Spring-Renaissance-Concierge@main/SR%20LOGO%20PNG.png" alt="Spring Renaissance" class="logo">
    </div>

    <div class="container">
        <h2>Оформление заказа</h2>
        <input type="text" id="name" placeholder="Ваше Имя">
        <input type="tel" id="phone" placeholder="Номер телефона">
        <input type="text" id="address" placeholder="Адрес ПВЗ СДЭК">
        <button id="send">ЗАКАЗАТЬ LE VASE LIVRE</button>
    </div>

    <div class="footer">
        © 2026 Spring Renaissance. Все права защищены.<br>
        Индивидуальный предприниматель Саградян Ф.А.<br>
        ИНН: 772834567890 | ОГРНИП: 324774600000000<br>
        Москва, Россия. <br>
        Нажимая кнопку, вы соглашаетесь с политикой конфиденциальности.
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let btn = document.getElementById('send');
        tg.expand();
        tg.ready();

        btn.onclick = function() {
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            let address = document.getElementById('address').value;

            if (!name || !phone || !address) {
                tg.showAlert("Пожалуйста, заполните все поля формы");
                return;
            }

            let data = {
                name: name,
                phone: phone,
                address: address
            };

            // Визуальная реакция
            btn.innerText = "ЗАПИСЫВАЕМ...";
            btn.disabled = true;

            fetch('https://eoq7cejdotidzt7.m.pipedream.net/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    tg.showConfirm("Благодарим за заказ! Наш консьерж свяжется с вами в ближайшее время.", function(ok){
                        tg.close();
                    });
                } else {
                    throw new Error();
                }
            })
            .catch(error => {
                btn.innerText = "ЗАКАЗАТЬ LE VASE LIVRE";
                btn.disabled = false;
                tg.showAlert("Произошла ошибка при отправке. Пожалуйста, проверьте интернет или попробуйте позже.");
            });
        };
    </script>
</body>
</html>
